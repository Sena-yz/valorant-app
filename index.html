<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    
    <base href="/valorant-app/" />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />


    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>valorant-app</title>
  </head>

  <body>
    <div class="theme-switch">
      <input type="checkbox" id="themeToggle" />

      <label for="themeToggle" class="switch">
        <span class="icon moon">🌙</span>
        <span class="icon sun">☀️</span>
      </label>
    </div>

    <h1>Valorant Agents</h1>

    <select id="roleFilter">
      <option value="all">All roles</option>
      <option value="Duelist">Duelist</option>
      <option value="Controller">Controller</option>
      <option value="Initiator">Initiator</option>
      <option value="Sentinel">Sentinel</option>
    </select>

    <input type="text" id="search" placeholder="Search agent..." />
    <button id="showFavs">Show Favorites</button>

    <div id="agents"></div>
    <div id="loading">Loading agents...</div>

    
    <script type="module" src="src/main.js"></script>

    
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <span id="closeModal">&times;</span>
        <img id="modalImg" />
        <h2 id="modalName"></h2>
        <p id="modalRole"></p>
        <div id="modalAbilities"></div>
      </div>
    </div>
  </body>
</html>
